#@data/values-schema
---
#! Registry and image settings
registry: "docker.io"
image_tag: "latest"

#! Application settings
app_port: 5000
namespace: doc-system

#! Container images (can be overridden, otherwise derived from registry/image_tag)
doc_image: "doc:latest"
gitter_image: "gitter:latest"

#! Database driver: "sqlite" (default) or "postgres"
db_driver: "sqlite"
#! DSN: file path for SQLite, connection string for PostgreSQL
db_dsn: "/data/doc.db"

#! Database connection settings (only used when db_driver is "postgres")
dbname: doc
dbuser: postgres
dbpwd: password
dbhost: pgsql-postgresql.postgres.svc.cluster.local
dbport: "5432"

#! Repository host providers
#@schema/type any=True
providers:
  - host: "github.com"
    type: "github"

#! Feature flags
analytics: "false"
is_dev: "false"

#! Image registry proxy (e.g., mirror.gcr.io for rate-limited registries)
image_proxy: ""
image_proxy_username: ""
image_proxy_password: ""

#! Database initialization SQL (loaded from schema/crds_up.sql via Makefile)
init_sql: ""
