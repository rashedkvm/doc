#! Default configuration for local development.
#! Override registry/image_tag via env vars: REGISTRY=myregistry IMAGE_TAG=v1.0.0 make build-all
#! For sensitive values (proxy credentials), use .env.local - see DEVELOPING.md

#! Registry and image settings
registry: "krashed843"
image_tag: "v1.0.0"

#! Application settings
app_port: 5000
namespace: doc-system

#! Database driver: "sqlite" (default, zero-infra) or "postgres" (backward compat)
db_driver: "sqlite"
#! DSN: file path for SQLite, connection string for PostgreSQL
db_dsn: "/data/doc.db"

#! PostgreSQL settings (only used when db_driver is "postgres")
#! dbname: doc
#! dbuser: postgres
#! dbpwd: password
#! dbhost: pgsql-postgresql.postgres.svc.cluster.local
#! dbport: "5432"
dbname: doc
dbuser: postgres
dbpwd: password
dbhost: pgsql-postgresql.postgres.svc.cluster.local
dbport: "5432"

#! Repository host providers
#! Each entry registers a Git host. The "github" type requires no auth.
#! For private GitHub Enterprise instances use type "github-enterprise"
#! with an auth_secret referencing a K8s secret or env var.
providers:
  - host: "github.com"
    type: "github"
  #! Example GitHub Enterprise entry:
  #! - host: "github.mycompany.com"
  #!   type: "github-enterprise"
  #!   auth_secret: "ghe-token-secret"
  #!   allowed_orgs:
  #!     - "platform-team"

#! Gateway API settings
#! Requires Gateway API CRDs and a controller (e.g. cloud-provider-kind for local dev)
gateway_enabled: false
gateway_class_name: "cloud-provider-kind"
gateway_port: 80

#! Feature flags
analytics: "false"
is_dev: "true"

#! Image registry proxy (for pulling base images through a mirror)
#! Leave empty if not using a proxy registry
image_proxy: ""
image_proxy_username: ""
image_proxy_password: ""
